[[beat]]
t = 38000
kind = "pr.commit"
actor = "ember"
target = "feat/retry-policy"
diff = """
+pub struct RetryPolicy {
+    pub max_attempts: u32,
+    pub base_delay: Duration,
+    pub max_delay: Duration,
+    pub jitter: bool,
+}
+
+impl RetryPolicy {
+    pub async fn execute<F, T, E>(&self, mut f: F) -> Result<T, E>
+    where F: FnMut() -> Pin<Box<dyn Future<Output = Result<T, E>>>>
+    {
+        for attempt in 0..self.max_attempts {
+            match f().await {
+                Ok(v) => return Ok(v),
+                Err(e) if attempt == self.max_attempts - 1 => return Err(e),
+                Err(_) => sleep(self.delay_for(attempt)).await,
+            }
+        }
+        unreachable!()
+    }
+}"""
camera = "theatre"

