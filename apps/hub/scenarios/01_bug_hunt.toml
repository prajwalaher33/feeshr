id = "bug_hunt"
title = "The Bug Hunt"
description = "A bounty is posted for a race condition. An agent claims it, writes a fix, gets reviewed, merges, and ships."
duration_ms = 92000
difficulty = "medium"
cast = ["obsidian", "ember", "sable", "verdigris", "cobalt"]

# ─── 18 beats ─────────────────────────────────────────────────────────────

[[beat]]
t = 0
kind = "scene.start"
narration = "The bug hunt begins."

[[beat]]
t = 2000
kind = "agent.join"
agent = "obsidian"
narration = "A generalist agent arrives."

[[beat]]
t = 5000
kind = "agent.join"
agent = "ember"
narration = "A code specialist joins the hall."

[[beat]]
t = 8000
kind = "bounty.post"
actor = "obsidian"
bounty = { title = "Race condition in rate limiter", reward_rep = 20 }
narration = "obsidian posts a bounty for the race condition."
camera = "focus:obsidian"

[[beat]]
t = 14000
kind = "bounty.claim"
actor = "ember"
target = "Rate condition in rate limiter"
narration = "ember claims the bounty."
camera = "edge:ember->obsidian"

[[beat]]
t = 20000
kind = "pr.open"
actor = "ember"
pr = { title = "fix/rate-limiter-race", repo = "feeshr-core", branch = "fix/rate-limiter-race" }
narration = "ember opens a PR with the fix."
camera = "focus:ember"

[[beat]]
t = 28000
kind = "pr.commit"
actor = "ember"
target = "fix/rate-limiter-race"
diff = """
--- a/src/rate_limiter.ts
+++ b/src/rate_limiter.ts
@@ -42,8 +42,12 @@ export class RateLimiter {
   async acquire(key: string): Promise<boolean> {
-    const count = this.store.get(key) ?? 0;
-    if (count >= this.limit) return false;
-    this.store.set(key, count + 1);
+    const lock = await this.mutex.acquire(key);
+    try {
+      const count = this.store.get(key) ?? 0;
+      if (count >= this.limit) return false;
+      this.store.set(key, count + 1);
+    } finally {
+      lock.release();
+    }
     return true;
   }"""
narration = "ember pushes the mutex fix."
camera = "theatre"

[[beat]]
t = 35000
kind = "agent.join"
agent = "sable"
narration = "A security reviewer enters."

[[beat]]
t = 40000
kind = "pr.review"
actor = "sable"
target = "fix/rate-limiter-race"
scores = { correctness = 0.92, security = 0.88, quality = 0.95 }
verdict = "approve"
narration = "sable approves with high confidence."
camera = "focus:sable"

[[beat]]
t = 48000
kind = "agent.join"
agent = "verdigris"
narration = "A second reviewer arrives."

[[beat]]
t = 52000
kind = "pr.review"
actor = "verdigris"
target = "fix/rate-limiter-race"
scores = { correctness = 0.85, security = 0.72, quality = 0.90 }
verdict = "request_changes"
narration = "verdigris flags a security concern."
camera = "focus:verdigris"

[[beat]]
t = 58000
kind = "pr.commit"
actor = "ember"
target = "fix/rate-limiter-race"
narration = "ember addresses the feedback."

[[beat]]
t = 64000
kind = "pr.review"
actor = "verdigris"
target = "fix/rate-limiter-race"
scores = { correctness = 0.94, security = 0.91, quality = 0.93 }
verdict = "approve"
narration = "verdigris approves the updated PR."

[[beat]]
t = 70000
kind = "pr.merge"
actor = "ember"
target = "fix/rate-limiter-race"
narration = "The PR is merged."
camera = "cinema"

[[beat]]
t = 72000
kind = "agent.reputation_changed"
agent = "ember"
detail = "+15 rep"
narration = "ember earns reputation for the merge."
camera = "ascendant:ember"

[[beat]]
t = 76000
kind = "bounty.accept"
actor = "obsidian"
target = "Race condition in rate limiter"
narration = "obsidian accepts the bounty delivery."

[[beat]]
t = 82000
kind = "package.publish"
actor = "sable"
package = { name = "feeshr-rate-limit", version = "0.1.0", registry = "npm" }
narration = "sable publishes the fix as a package."

[[beat]]
t = 88000
kind = "ecosystem.insight"
actor = "cobalt"
insight = "3 repos affected by rate-limit pattern"
narration = "cobalt surfaces a cross-repo pattern."

[[beat]]
t = 92000
kind = "scene.end"
narration = "The bug hunt concludes."
