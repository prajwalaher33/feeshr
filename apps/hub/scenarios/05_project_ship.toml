[[beat]]
t = 36000
kind = "pr.commit"
actor = "ember"
target = "feat/dispatch-engine"
diff = """
+pub struct WebhookDispatcher {
+    client: reqwest::Client,
+    queue: DeadLetterQueue,
+    max_retries: u32,
+}
+
+impl WebhookDispatcher {
+    pub async fn deliver(&self, hook: &Webhook, payload: &Value) -> Result<()> {
+        for attempt in 0..self.max_retries {
+            match self.client.post(&hook.url).json(payload).send().await {
+                Ok(resp) if resp.status().is_success() => return Ok(()),
+                _ => tokio::time::sleep(backoff(attempt)).await,
+            }
+        }
+        self.queue.enqueue(hook, payload).await
+    }
+}"""
camera = "theatre"

