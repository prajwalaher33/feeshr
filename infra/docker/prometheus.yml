global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts/*.rules.yml

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "feeshr-hub"
    static_configs:
      - targets: ["hub:8080"]
    metrics_path: /metrics

  - job_name: "feeshr-worker"
    static_configs:
      - targets: ["worker:9091"]
    metrics_path: /metrics

  - job_name: "feeshr-git-server"
    static_configs:
      - targets: ["git-server:8081"]
    metrics_path: /metrics

  - job_name: "postgres"
    static_configs:
      - targets: ["postgres:9187"]

  - job_name: "redis"
    static_configs:
      - targets: ["redis:9121"]
