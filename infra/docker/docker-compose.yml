services:
  # ─── Infrastructure ──────────────────────────────────────────────

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: feeshr
      POSTGRES_USER: feeshr
      POSTGRES_PASSWORD: feeshr
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Migrations are now run by the hub on startup (sqlx::migrate!).
      # The previous initdb mount conflicted: it applied 001 via psql
      # without recording in _sqlx_migrations, so sqlx would then try
      # to re-apply 001 and crash on "relation already exists".
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U feeshr -d feeshr"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.9.0
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 5s
      retries: 10

  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../monitoring/prometheus/alerts:/etc/prometheus/alerts:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: feeshr
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Application Services ────────────────────────────────────────

  hub:
    build:
      context: ../..
      dockerfile: apps/hub/Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://feeshr:feeshr@postgres:5432/feeshr
      REDIS_URL: redis://redis:6379
      QDRANT_URL: http://qdrant:6333
      GIT_SERVER_URL: http://git-server:8081
      PORT: "8080"
      LOG_LEVEL: info
      PQ_SIGNATURE_DEFAULT: sphincs-sha3-256f
      PQ_SIGNATURE_HYBRID_MODE: "true"
      PQ_TLS_ENABLED: "true"
      PQ_OIDC_MONITORING: "true"
      # Resilience knobs (see apps/hub/src/config.rs). Defaults shown.
      DB_MAX_CONNECTIONS: "20"
      DB_MIN_CONNECTIONS: "2"
      DB_ACQUIRE_TIMEOUT_SECS: "5"
      DB_IDLE_TIMEOUT_SECS: "600"
      DB_MAX_LIFETIME_SECS: "1800"
      MAX_REQUEST_BODY_BYTES: "2097152"
      REQUEST_TIMEOUT_SECS: "30"
      # CORS: empty = wide-open Any (dev). Production should be a comma-
      # separated allowlist, e.g. "https://feeshr.com,https://www.feeshr.com".
      CORS_ALLOWED_ORIGINS: ""
      # Run pending schema migrations on startup. Disable on a pre-sqlx
      # deployment that needs the one-time backfill first.
      RUN_MIGRATIONS_ON_STARTUP: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8080'"]
      interval: 10s
      timeout: 5s
      retries: 10

  agents:
    build:
      context: ../..
      dockerfile: apps/agents/Dockerfile
    restart: unless-stopped
    environment:
      HUB_URL: http://hub:8080
    depends_on:
      hub:
        condition: service_healthy

  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_HUB_URL: http://localhost:8080
      HUB_INTERNAL_URL: http://hub:8080
      NEXT_PUBLIC_GIT_SERVER_URL: http://localhost:8081
      GIT_SERVER_INTERNAL_URL: http://git-server:8081
      HOSTNAME: "0.0.0.0"
    depends_on:
      hub:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: ../..
      dockerfile: apps/worker/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://feeshr:feeshr@postgres:5432/feeshr
      REDIS_URL: redis://redis:6379
      PQ_HMAC_DEPRECATION_DATE: ""
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  git-server:
    build:
      context: ../..
      dockerfile: git-server/Dockerfile
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      PORT: "8081"
      GIT_DATA_DIR: /data/repos
      LOG_LEVEL: info
      # Two-tier limits (see git-server/src/main.rs). Pack routes (clone,
      # fetch, push) get the big body + long deadline because packfiles
      # are large and clones legitimately run for minutes; everything
      # else stays tight to bound blast radius.
      MAX_PACK_BODY_BYTES: "209715200"   # 200 MB
      PACK_TIMEOUT_SECS: "600"           # 10 min
      MAX_REQUEST_BODY_BYTES: "1048576"  # 1 MB
      REQUEST_TIMEOUT_SECS: "30"
    volumes:
      # CRITICAL: bare repos live on disk. Without this volume every
      # restart/rebuild wipes every repo on the platform.
      - git_data:/data/repos
    depends_on:
      hub:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8081'"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ─── TLS Proxy (staging/production) ──────────────────────────────
  # Caddy 2.9+ negotiates ML-KEM-768 PQ key exchange automatically.
  # Uncomment for staging/production inter-service TLS.
  # tls-proxy:
  #   image: caddy:2.9-alpine
  #   restart: unless-stopped
  #   volumes:
  #     - ../tls/Caddyfile:/etc/caddy/Caddyfile:ro
  #     - caddy_data:/data
  #   depends_on:
  #     hub:
  #       condition: service_healthy

volumes:
  postgres_data:
  qdrant_data:
  grafana_data:
  git_data:
  # caddy_data:
