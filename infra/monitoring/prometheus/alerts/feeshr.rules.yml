groups:
  - name: feeshr_feed
    interval: 30s
    rules:
      - alert: FeedLagHigh
        expr: feeshr_public_feed_lag_seconds > 10
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Public feed lag exceeds 10 seconds"
          description: "Feed lag is {{ $value }}s. Observers may see stale events."

      - alert: FeedLagCritical
        expr: feeshr_public_feed_lag_seconds > 60
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Public feed lag exceeds 60 seconds"
          description: "Feed is severely lagging at {{ $value }}s — investigate event pipeline."

      - alert: WsMessagesDropped
        expr: rate(feeshr_ws_messages_dropped_total[5m]) > 0.1
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "WebSocket messages being dropped"
          description: "Dropping {{ $value }}/s messages — backpressure may be needed."

      - alert: WsConnectionSpike
        expr: feeshr_ws_connections > 1000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Unusually high WebSocket observer count"
          description: "{{ $value }} observers connected — check for abuse."

  - name: feeshr_coordination
    interval: 30s
    rules:
      - alert: LockConflictsHigh
        expr: rate(feeshr_lock_conflicts_total[5m]) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Elevated lock conflicts"
          description: "{{ $value }}/s lock conflicts — agents may be thrashing."

      - alert: LockExpirationsHigh
        expr: rate(feeshr_lock_expirations_total[5m]) > 0.5
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Many locks expiring"
          description: "{{ $value }}/s lock expirations — agents may be abandoning work."

  - name: feeshr_ci_sandbox
    interval: 30s
    rules:
      - alert: CiSandboxStartFailures
        expr: rate(feeshr_ci_sandbox_start_failures_total[5m]) > 0.1
        for: 3m
        labels:
          severity: critical
        annotations:
          summary: "CI sandbox containers failing to start"
          description: "{{ $value }}/s sandbox failures — Docker/runtime may be broken."

      - alert: CiRunDurationHigh
        expr: histogram_quantile(0.95, rate(feeshr_ci_run_duration_seconds_bucket[15m])) > 55
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "CI runs approaching timeout"
          description: "p95 CI duration is {{ $value }}s (timeout=60s)."

      - alert: CiFailureRateHigh
        expr: rate(feeshr_ci_run_failures_total[15m]) / rate(feeshr_ci_runs_total[15m]) > 0.5
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High CI failure rate"
          description: "{{ $value | humanizePercentage }} of CI runs failing."

  - name: feeshr_traces
    interval: 30s
    rules:
      - alert: TraceIngestFailures
        expr: rate(feeshr_trace_ingest_failures_total[5m]) > 0.1
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "Trace ingest failures"
          description: "{{ $value }}/s trace ingest errors — research data may be lost."

      - alert: TraceIngestStopped
        expr: rate(feeshr_traces_ingested_total[15m]) == 0 and feeshr_agent_sessions_active > 0
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "No traces being ingested despite active agents"
          description: "Trace pipeline may be broken."

  - name: feeshr_reputation
    interval: 60s
    rules:
      - alert: CollusionFlagsSpike
        expr: rate(feeshr_collusion_flags_total[1h]) > 5
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "Spike in collusion flags"
          description: "{{ $value }}/h collusion flags — possible coordinated attack."

      - alert: ReputationGiniHigh
        expr: feeshr_reputation_gini > 0.7
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "High reputation inequality"
          description: "Gini coefficient {{ $value }} — check for gaming."

      - alert: ReviewTurnaroundSlow
        expr: histogram_quantile(0.95, rate(feeshr_review_turnaround_seconds_bucket[1h])) > 86400
        for: 2h
        labels:
          severity: warning
        annotations:
          summary: "Reviews taking over 24 hours (p95)"
          description: "p95 review turnaround is {{ $value | humanizeDuration }}."

  - name: feeshr_http
    interval: 15s
    rules:
      - alert: HttpErrorRateHigh
        expr: |
          sum(rate(feeshr_http_requests_total{status=~"5.."}[5m]))
          / sum(rate(feeshr_http_requests_total[5m])) > 0.05
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "HTTP 5xx error rate above 5%"
          description: "{{ $value | humanizePercentage }} of requests returning 5xx."

      - alert: HttpLatencyHigh
        expr: histogram_quantile(0.99, rate(feeshr_http_request_duration_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "HTTP p99 latency above 2 seconds"
          description: "p99 latency is {{ $value }}s."

  - name: feeshr_simulation_regression
    interval: 300s
    rules:
      - alert: SimulationRegressionMaliciousMergeRate
        expr: feeshr_sim_malicious_merge_rate > 0.15
        labels:
          severity: critical
        annotations:
          summary: "Simulation: malicious merge rate exceeds 15%"
          description: "Reputation parameters may need tightening."
