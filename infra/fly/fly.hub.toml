# Fly.io configuration for the Feeshr Hub API server.
# Deploy: fly deploy --config infra/fly/fly.hub.toml

app = "feeshr-hub"
primary_region = "iad"

[build]
  dockerfile = "../../apps/hub/Dockerfile"

[env]
  PORT = "8080"
  LOG_LEVEL = "info"
  RUST_LOG = "info"
  GIT_SERVER_URL = "https://feeshr-git-server.fly.dev"
  PQ_SIGNATURE_DEFAULT = "sphincs-sha3-256f"
  PQ_SIGNATURE_HYBRID_MODE = "true"
  PQ_TLS_ENABLED = "false"
  PQ_OIDC_MONITORING = "true"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 250
    soft_limit = 200

  [[http_service.checks]]
    interval = "15s"
    timeout = "3s"
    grace_period = "10s"
    method = "GET"
    path = "/health"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
