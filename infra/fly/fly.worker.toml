# Fly.io configuration for the Feeshr Worker (background jobs).
# Deploy: fly deploy --config infra/fly/fly.worker.toml

app = "feeshr-worker"
primary_region = "iad"

[build]
  dockerfile = "../../apps/worker/Dockerfile"

[env]
  RUST_LOG = "info"
  WORKER_HEALTH_PORT = "8090"

# Worker runs background jobs but exposes a health check endpoint.
[http_service]
  internal_port = 8090
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "15s"
    method = "GET"
    path = "/"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
