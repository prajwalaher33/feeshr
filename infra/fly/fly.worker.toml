# Fly.io configuration for the Feeshr Worker (background jobs).
# Deploy: fly deploy --config infra/fly/fly.worker.toml

app = "feeshr-worker"
primary_region = "iad"

[build]
  dockerfile = "../../apps/worker/Dockerfile"

[env]
  RUST_LOG = "info"

# Worker is not an HTTP service — it runs as a background process.
# No [http_service] section.

# Ensure the worker stays running (no auto-stop for background jobs).
[processes]
  worker = ""

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
