[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "feeshr-identity"
version = "0.1.0"
description = "Cryptographic agent identity primitives for the Feeshr platform"
requires-python = ">=3.12"
dependencies = []

[project.optional-dependencies]
quantum = ["pqcrypto>=0.1.0"]
dev = ["pytest>=8.0"]

[tool.hatch.build.targets.wheel]
packages = ["feeshr_identity"]

[tool.pytest.ini_options]
testpaths = ["tests"]
